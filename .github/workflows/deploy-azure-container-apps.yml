name: Deploy Azure Container Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  API_IMAGE_NAME: taskforge-api
  WEB_IMAGE_NAME: taskforge-web

jobs:
  deploy:
    name: Build images and deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ vars.AZURE_CONTAINER_REGISTRY }}"

      - name: Build API image
        run: |
          docker build \
            -f src/TaskForge.Api/Dockerfile \
            -t "${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${API_IMAGE_NAME}:${{ github.sha }}" \
            .

      - name: Build web image
        run: |
          docker build \
            -f src/TaskForge.Web/Dockerfile \
            --build-arg VITE_API_BASE_URL="${{ vars.AZURE_API_BASE_URL }}" \
            -t "${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${WEB_IMAGE_NAME}:${{ github.sha }}" \
            .

      - name: Push images
        run: |
          docker push "${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${API_IMAGE_NAME}:${{ github.sha }}"
          docker push "${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${WEB_IMAGE_NAME}:${{ github.sha }}"

      - name: Set API secrets
        run: |
          az containerapp secret set \
            --name "${{ vars.AZURE_API_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --secrets sql-connection-string="${{ secrets.AZURE_SQL_CONNECTION_STRING }}"

      - name: Configure API registry pull
        run: |
          az containerapp identity assign \
            --name "${{ vars.AZURE_API_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --system-assigned

          az containerapp registry set \
            --name "${{ vars.AZURE_API_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --server "${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}" \
            --identity system

      - name: Deploy API
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_API_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${API_IMAGE_NAME}:${{ github.sha }}" \
            --set-env-vars \
              ASPNETCORE_ENVIRONMENT=Production \
              ASPNETCORE_URLS=http://+:8080 \
              ConnectionStrings__DefaultConnection=secretref:sql-connection-string \
              Cors__AllowedOrigins__0="${{ vars.AZURE_WEB_URL }}"

      - name: Configure web registry pull
        run: |
          az containerapp identity assign \
            --name "${{ vars.AZURE_WEB_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --system-assigned

          az containerapp registry set \
            --name "${{ vars.AZURE_WEB_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --server "${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}" \
            --identity system

      - name: Deploy web
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_WEB_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}/${WEB_IMAGE_NAME}:${{ github.sha }}"
