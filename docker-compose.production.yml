services:
  taskforge-web:
    build:
      context: .
      dockerfile: src/TaskForge.Web/Dockerfile
      args:
        VITE_API_BASE_URL: ${TASKFORGE_PUBLIC_API_URL:?Set TASKFORGE_PUBLIC_API_URL}
    depends_on:
      - taskforge-api
    ports:
      - "${TASKFORGE_WEB_PORT:-80}:80"
    restart: unless-stopped

  taskforge-api:
    build:
      context: .
      dockerfile: src/TaskForge.Api/Dockerfile
    depends_on:
      taskforge-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${TASKFORGE_SQL_CONNECTION_STRING:?Set TASKFORGE_SQL_CONNECTION_STRING}
      Cors__AllowedOrigins__0: ${TASKFORGE_PUBLIC_WEB_URL:?Set TASKFORGE_PUBLIC_WEB_URL}
    ports:
      - "${TASKFORGE_API_PORT:-8080}:8080"
    restart: unless-stopped

  taskforge-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${TASKFORGE_SQL_PASSWORD:?Set TASKFORGE_SQL_PASSWORD}
    volumes:
      - taskforge-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  taskforge-sql-data:
